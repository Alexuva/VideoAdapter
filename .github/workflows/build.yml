name: Build Windows
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '24'
          distribution: 'temurin'
      - run: mvn clean package
      - run: jpackage --input target/ --name VideoAdapter --main-jar VideoAdapter-1.0-SNAPSHOT.jar --main-class com.alexuva.app.videoadapter.VideoAdapterApplication --type exe --dest output/
      - uses: actions/upload-artifact@v3
        with:
          name: VideoAdapter-windows
          path: output/